site_name: Terminal Agent
site_description: An LLM Agent to help you from and within the terminal
repo_url: https://github.com/laszukdawid/terminal-agent
repo_name: laszukdawid/terminal-agent

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Integration:
      - Fedora: integration/fedora.md
      - macOS: integration/macos.md
      - Ubuntu: integration/ubuntu.md
  - Commands:
      - Overview: commands.md
      - Ask Command: commands/ask.md
      - Task Command: commands/task.md
      - Routine Command: commands/routine.md
      - Daemon Command: commands/daemon.md
      - Tool Command: commands/tool.md
      - Plugin Command: commands/plugin.md
      - Config Command: commands/config.md
      - History Command: commands/history.md
  - Popup GUI: gui.md
  - Tools: tools.md
  - Providers: providers.md
  - Configuration: configuration.md
  - Approval Logic: approval-logic.md
  - Examples: examples.md
  - Architecture: architecture.md
  - Developers: developers.md
