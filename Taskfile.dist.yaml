version: "3"

dotenv:
  - .env

env:
  TEST_INTEG_DIR: "{{.USER_WORKING_DIR}}/test"

vars:
  TEST_IMAGE_NAME: "terminal-test"
  TEST_TIMEOUT: "5m"
  SHELL_CFG: "~/.bashrc"

tasks:
  build:
    cmds:
      - task: build:agent
      - task: build:gui
    silent: false

  build:agent:
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}} -X main.commit={{.COMMIT}} -X main.date={{.DATE}}" -o bin/agent ./cmd/agent/main.go

  build:gui:
    cmds:
      - go build -o bin/agent-gui ./cmd/agent-gui/main.go
    silent: false

  install:
    silent: true
    cmds:
      - task: build
      - mkdir -p ~/.local/bin
      - cp bin/agent ~/.local/bin/agent
      - echo "Terminal Agent installed to ~/.local/bin/agent"
      - echo "To run the agent, add ~/.local/bin to your PATH."
      - echo "You can do this by running:"
      - echo "  echo 'export PATH=\$PATH:~/.local/bin' >> ~/.bashrc"

  install:alias:
    desc: Install the alias for the agent
    preconditions:
      - sh: test -f {{.SHELL_CFG}}
        msg: "Auto-alias only works for bash shell. Please add the alias manually."
    status:
      - grep -q 'terminal-agent alias' {{.SHELL_CFG}}
    cmds:
      - printf '\n# BEGIN terminal-agent alias\n' >> {{.SHELL_CFG}}
      - printf 'alias aa="agent ask "\n' >> {{.SHELL_CFG}}
      - printf '\n# END terminal-agent alias\n' >> {{.SHELL_CFG}}

  install:pre-commit:
    desc: Install the Git pre-commit hook
    preconditions:
      - sh: git rev-parse --is-inside-work-tree >/dev/null 2>&1
        msg: "This task must be run inside a Git worktree."
      - sh: test -f .githooks/pre-commit
        msg: "Missing versioned hook script at .githooks/pre-commit."
    cmds:
      - |
        HOOK_DIR="$(git rev-parse --git-path hooks)" &&
        mkdir -p "$HOOK_DIR" &&
        install -m 0755 .githooks/pre-commit "$HOOK_DIR/pre-commit"
      - echo "Installed Git pre-commit hook to $(git rev-parse --git-path hooks)/pre-commit"

  uninstall:alias:
    desc: Remove aliases for the agent
    cmds:
      - sed -i -n -e '/^# BEGIN/,/^# END/!p' {{.SHELL_CFG}}
  
  test:
    desc: Run all tests
    cmds:
      - go test -v ./cmd/agent ./internal/agent ./internal/app ./internal/chat ./internal/commands ./internal/config ./internal/connector ./internal/history ./internal/memory ./internal/tools ./internal/utils

  # Application related
  run:
    cmds:
      - go run cmd/agent/main.go
    silent: false

  run:gui:
    desc: Run the popup GUI
    cmds:
      - go run cmd/agent-gui/main.go
    silent: false

  integration:fedora:
    desc: Install Fedora desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_fedora.sh
    silent: false

  integration:fedora:uninstall:
    desc: Remove Fedora desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_fedora.sh --uninstall
    silent: false

  integration:ubuntu:
    desc: Install Ubuntu desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_ubuntu.sh
    silent: false

  integration:ubuntu:uninstall:
    desc: Remove Ubuntu desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_ubuntu.sh --uninstall
    silent: false

  deps:gui:macos:
    desc: Check macOS GUI build dependencies (Xcode Command Line Tools)
    cmds:
      - |
        if ! xcode-select -p >/dev/null 2>&1; then
          echo "Xcode Command Line Tools not found."
          echo "Install them with: xcode-select --install"
          exit 1
        fi
        echo "Xcode Command Line Tools found at $(xcode-select -p)"
    silent: false

  integration:macos:
    desc: Install macOS desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_macos.sh
    silent: false

  integration:macos:uninstall:
    desc: Remove macOS desktop integration for the popup GUI
    cmds:
      - bash scripts/integ_macos.sh --uninstall
    silent: false

  run:ask:
    vars:
      ARGS: "{{.CLI_ARGS}}"
    desc: Run the agent with a question, e.g. `task run:ask -- "What is the meaning of life?"`
    cmds:
      - go run cmd/agent/main.go --loglevel debug ask --log {{.ARGS}}
    silent: false

  run:ask:stream:
    vars:
      ARGS: "{{.CLI_ARGS}}"
    desc: Run the agent with a question, e.g. `task run:ask -- "What is the meaning of life?"`
    cmds:
      - go run cmd/agent/main.go  --loglevel debug ask --stream --log {{.ARGS}}
    silent: false

  run:task:
    vars:
      ARGS: "{{.CLI_ARGS}}"
    desc: Run the agent with a task, e.g. `task run:task -- "List all files in home directory"`
    cmds:
      # - go run cmd/agent/main.go task --log --provider $PROVIDER --query "{{.ARGS}}"
      - go run cmd/agent/main.go task --loglevel debug --provider $PROVIDER {{.ARGS}}
    silent: false

  run:tool:exec:
    vars:
      TOOL: "{{.TOOL}}"
      QUERY: "{{.QUERY}}"
    desc: Run the agent with a tool
    cmds:
      - go run cmd/agent/main.go
        --loglevel debug
        tool exec
        {{.TOOL}}
        {{.QUERY}}

  run:tool:exec:unix:
    desc: Run the agent with a tool
    vars:
      CMD: "ls -la"
    cmds:
      - task: run:tool:exec
        vars:
          TOOL: "unix"
          QUERY: '{"command":"{{.CMD}}"}'

  run:set:openai:
    desc: Set the provider to openai
    cmds:
      - go run cmd/agent/main.go config set provider openai
      - go run cmd/agent/main.go config set model gpt-4o-mini-2024-07-18

  run:set:anthropic:
    desc: Set the provider to anthropic
    cmds:
      - go run cmd/agent/main.go config set provider anthropic
      - go run cmd/agent/main.go config set model claude-3-haiku-latest

  run:set:bedrock:
    desc: Set the provider to bedrock
    cmds:
      - go run cmd/agent/main.go config set provider bedrock
      - go run cmd/agent/main.go config set model anthropic.claude-3-haiku-20240307-v1:0

  run:set:google:
    desc: Set the provider to google
    cmds:
      - go run cmd/agent/main.go config set provider google
      - go run cmd/agent/main.go config set model gemini-2.0-flash-lite
  
  run:set:ollama:
    desc: Set the provider to ollama
    cmds:
      - go run cmd/agent/main.go config set provider ollama
      - go run cmd/agent/main.go config set model llama3.2

  run:set:llama:
    desc: Set the provider to direct local llama.cpp
    cmds:
      - go run cmd/agent/main.go config set provider llama
      - go run cmd/agent/main.go config set model llama3.2

  deps:llama:
    desc: Install the yzma CLI used for local llama.cpp runtime setup
    cmds:
      - go install github.com/hybridgroup/yzma@v1.14.1
      - mkdir -p ~/.local/share/yzma/lib
      - ~/go/bin/yzma install --lib ~/.local/share/yzma/lib {{if .VERSION}}--version {{.VERSION}}{{end}}
      - |
        printf 'Set YZMA_LIB in your shell profile, for example:\n  echo '\''export YZMA_LIB="$HOME/.local/share/yzma/lib"'\'' >> ~/.bashrc\n'

  run:generate:
    desc: Execute generation
    cmds:
      - go build -tags=tools -o bin/generate
      - go generate ./...

  # Environment related - mainly for testing
  env:build:
    desc: Build the test environment
    cmds:
      - docker build -t {{.TEST_IMAGE_NAME}} .
    silent: false

  deps:gui:ubuntu:
    desc: Install Ubuntu GUI dependencies required for Fyne
    cmds:
      - sudo apt-get update
      # libgl1-mesa-dev: OpenGL headers and linker support used by Fyne's desktop renderer.
      # xorg-dev: umbrella package for core X11 development headers used by GLFW/Fyne.
      # libx11-dev: base X11 client library headers.
      # libxcursor-dev: cursor management support for desktop windows.
      # libxrandr-dev: monitor sizing and resize notifications.
      # libxinerama-dev: multi-monitor geometry support.
      # libxi-dev: keyboard and pointer input extensions.
      # libxxf86vm-dev: XFree86 video mode extension required by the GLFW stack used by Fyne.
      - sudo apt-get install -y libgl1-mesa-dev xorg-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev
    silent: false

  deps:gui:fedora:
    desc: Install Fedora GUI dependencies required for Fyne
    cmds:
      # Fedora mirrors can occasionally return transient 404s during metadata refresh.
      # If dnf finishes with "Complete!", the required packages were installed successfully.
      # mesa-libGL-devel: OpenGL headers and linker support used by Fyne's desktop renderer.
      # libX11-devel: base X11 client library headers.
      # libXcursor-devel: cursor management support for desktop windows.
      # libXrandr-devel: monitor sizing and resize notifications.
      # libXinerama-devel: multi-monitor geometry support.
      # libXi-devel: keyboard and pointer input extensions.
      # libXxf86vm-devel: XFree86 video mode extension required by the GLFW stack used by Fyne.
      - sudo dnf install -y mesa-libGL-devel libX11-devel libXcursor-devel libXrandr-devel libXinerama-devel libXi-devel libXxf86vm-devel
    silent: false

  env:setup:
    desc: Setup the test environment
    deps:
      - env:build
    cmds:
      - docker container stop {{.TEST_IMAGE_NAME}} || true
      - docker container rm {{.TEST_IMAGE_NAME}} || true
      - docker run -d
        --volume $(pwd):/agent
        --name {{.TEST_IMAGE_NAME}} {{.TEST_IMAGE_NAME}}
        sh -c "while true; do sleep {{.TEST_TIMEOUT}}; done"
    silent: false

  env:access:
    desc: Access the test environment
    cmds:
      - docker exec -it {{.TEST_IMAGE_NAME}} sh

  # Tests
  test:unit:
    cmds:
      - go test -v ./cmd/agent ./internal/agent ./internal/app ./internal/chat ./internal/commands ./internal/config ./internal/connector ./internal/history ./internal/memory ./internal/tools ./internal/utils

  test:integration:
    env:
      TEST_INTEG_DIR: "{{.USER_WORKING_DIR}}/test"
    cmds:
      - go test -v -tags=integration ./cmd/agent ./internal/agent ./internal/app ./internal/chat ./internal/commands ./internal/config ./internal/connector ./internal/history ./internal/memory ./internal/tools ./internal/utils

  test:integration:env:
    deps:
      - env:setup
    env:
      TEST_INTEG_DIR: "/agent/test"
    cmds:
      - docker ps | grep {{.TEST_IMAGE_NAME}}
      - docker exec --env TEST_INTEG_DIR=$TEST_INTEG_DIR {{.TEST_IMAGE_NAME}} go test -v -tags=integration ./cmd/agent ./internal/agent ./internal/app ./internal/chat ./internal/commands ./internal/config ./internal/connector ./internal/history ./internal/memory ./internal/tools ./internal/utils
      - docker stop {{.TEST_IMAGE_NAME}}

  # Testing models

  ## ASK
  test:model:ask:
    vars:
      Q: '{{default "What command shows disk usage in human readable form?" .Q}}'
      PROVIDER: '{{default "openai" .PROVIDER}}'
      MODEL: '{{default "gpt-4o-mini" .MODEL}}'
    silent: true
    cmds:
      - go run cmd/agent/main.go
        --loglevel debug
        ask
        --log
        --provider {{.PROVIDER}}
        --model {{.MODEL}}
        {{.Q}}

  test:model:ask:openai:
    vars:
      Q: "What command shows disk usage in human readable form?"
      PROVIDER: "openai"
      MODEL: "gpt-4o-mini"
    cmds:
      - task: test:model:ask
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  test:model:ask:bedrock:
    vars:
      Q: "What command shows disk usage in human readable form?"
      PROVIDER: "bedrock"
      MODEL: "anthropic.claude-3-haiku-20240307-v1:0"
    cmds:
      - task: test:model:ask
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  test:model:ask:google:
    vars:
      Q: "What command shows disk usage in human readable form?"
      PROVIDER: "google"
      MODEL: "gemini-2.0-flash-lite"
    cmds:
      - task: test:model:ask
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  # TASK
  test:model:task:
    vars:
      Q: '{{default "What command shows disk usage in human readable form?" .Q}}'
      PROVIDER: '{{default "openai" .PROVIDER}}'
      MODEL: '{{default "gpt-4o-mini" .MODEL}}'
    # desc: Run the agent with a question`
    silent: true
    cmds:
      - go run cmd/agent/main.go
        --loglevel debug
        task
        --log
        --provider {{.PROVIDER}}
        --model {{.MODEL}}
        {{.Q}}

  test:model:task:openai:
    vars:
      Q: "List all files in home directory"
      PROVIDER: "openai"
      MODEL: "gpt-4o-mini"
    cmds:
      - task: test:model:task
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  test:model:task:bedrock:
    vars:
      Q: "List all files in home directory"
      PROVIDER: "bedrock"
      MODEL: "anthropic.claude-3-haiku-20240307-v1:0"
    cmds:
      - task: test:model:task
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  test:model:task:google:
    vars:
      Q: "List all files in home directory"
      PROVIDER: "google"
      MODEL: "gemini-2.0-flash-lite"
    cmds:
      - task: test:model:task
        vars:
          PROVIDER: "{{.PROVIDER}}"
          MODEL: "{{.MODEL}}"
          Q: "{{.Q}}"

  # Misc
  misc:download-spec:antrhopic:
    desc: Download the spec for the bedrock model
    cmds:
      - mkdir -p specs
      - curl -o specs/anthropic-spec.yaml https://raw.githubusercontent.com/laszukdawid/anthropic-openapi-spec/refs/heads/main/hosted_spec.json
